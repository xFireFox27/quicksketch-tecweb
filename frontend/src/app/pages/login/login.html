<div class="flex items-center justify-center min-h-[calc(100vh-4rem)]">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border-t-4 border-blue-500 relative z-10">
    <h2 class="text-3xl font-extrabold text-slate-800 text-center mb-6">Bentornato!</h2>
    
    @if (errorMessage) {
      <div class="bg-red-100 border border-red-300 text-red-700 p-3 rounded-lg mb-4 text-sm text-center font-bold">
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
          placeholder="Inserisci il tuo username"
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
          placeholder="••••••••"
        >
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid"
        class="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-md"
      >
        Accedi
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-600">
      Non hai un account? 
      <a routerLink="/register" class="text-blue-500 hover:underline font-bold">Registrati ora</a>
    </p>
  </div>
</div>
